<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypertrophy Analytics Dashboard</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: #161a1f;
            --accent-color: #3b82f6; /* Modern athletic blue */
            --accent-hover: #2563eb;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #242b35;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-container {
            width: 100%;
            max-width: 550px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            margin: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        select, input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
        }

        .result-card {
            margin-top: 30px;
            padding: 20px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            text-align: center;
        }

        .result-val {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-color);
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h1>Hypertrophy Predictor</h1>
    <p class="subtitle">Enter your training metrics to calculate estimated muscle growth response.</p>

    <form method="POST" action="">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="muscle_group">Target Muscle Group</label>
            <select id="muscle_group" name="muscle_group">
                <option value="chest">Chest</option>
                <option value="back">Back</option>
                <option value="legs">Legs</option>
                <option value="arms">Arms</option>
                <option value="shoulders">Shoulders</option>
            </select>
        </div>

        <div class="form-group">
            <label for="weekly_sets">Weekly Working Sets</label>
            <input type="number" id="weekly_sets" name="weekly_sets" min="1" max="40" placeholder="e.g., 12" required>
        </div>

        <div class="form-group">
            <label for="intensity">Average Intensity (RPE / RIR)</label>
            <select id="intensity" name="intensity">
                <option value="10">RPE 10 (Failure)</option>
                <option value="9">RPE 9 (1 Rep Reserve)</option>
                <option value="8">RPE 8 (2 Reps Reserve)</option>
                <option value="7">RPE 7 or below</option>
            </select>
        </div>

        <button type="submit" class="btn-submit">Analyze Hypertrophy Score</button>
    </form>

    {% if prediction %}
    <div class="result-card">
        <label>Predicted Hypertrophy Response</label>
        <div class="result-val">{{ prediction }}</div>
    </div>
    {% endif %}
</div>

</body>
</html>
